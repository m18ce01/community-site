<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiable Community - Service Discontinued</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1117;
            color: #e0e0e6;
            overflow: hidden;
        }

        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(56, 90, 160, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(80, 60, 140, 0.08) 0%, transparent 60%);
        }

        .container {
            position: relative; z-index: 1;
            text-align: center;
            max-width: 520px;
            padding: 2rem;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 64px; height: 64px;
            margin: 0 auto 2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        p {
            font-size: 1rem;
            line-height: 1.7;
            color: #8a8a9a;
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 40px; height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 1.5rem auto;
        }

        a {
            color: #6b8acd;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover { color: #93b0e8; }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.82rem;
            color: #4a4a5a;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>This Site Has Been Retired</h1>
        <p>The Multiable Community site is no longer in service.</p>
        <p>Thank you for your past support and participation.</p>
        <div class="divider"></div>
        <p>For any enquiries, please visit <a href="https://www.multiable.com" target="_blank" rel="noopener">multiable.com</a></p>
        <div class="footer">&copy; Multiable</div>
    </div>
</body>
</html>
